<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="Transcript">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="0.55" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#9333EA"/>
    </linearGradient>
    <radialGradient id="sheen" cx="512" cy="200" r="620" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="0.6" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="capsule" x1="512" y1="240" x2="512" y2="648" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#EEF2FF"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dy="10"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#sheen)"/>

  <g filter="url(#softShadow)">
    <rect x="400" y="240" width="224" height="408" rx="112" ry="112" fill="url(#capsule)"/>
    <path d="M 336 616 A 176 176 0 0 0 688 616" fill="none" stroke="#ffffff" stroke-width="36" stroke-linecap="round"/>
    <line x1="512" y1="792" x2="512" y2="860" stroke="#ffffff" stroke-width="36" stroke-linecap="round"/>
    <line x1="420" y1="860" x2="604" y2="860" stroke="#ffffff" stroke-width="36" stroke-linecap="round"/>
  </g>

  <g opacity="0.55" fill="#ffffff">
    <rect x="244" y="432" width="24" height="24" rx="12"/>
    <rect x="204" y="408" width="24" height="72" rx="12"/>
    <rect x="796" y="408" width="24" height="72" rx="12"/>
    <rect x="756" y="432" width="24" height="24" rx="12"/>
  </g>
</svg>
